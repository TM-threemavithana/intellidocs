version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: intellidocs-postgres
    environment:
      POSTGRES_USER: intellidocs
      POSTGRES_PASSWORD: intellidocs_dev_password
      POSTGRES_DB: intellidocs_db
      POSTGRES_PORT: 5432
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intellidocs"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - intellidocs-network

  # Redis Cache & Job Queue
  redis:
    image: redis:7-alpine
    container_name: intellidocs-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - intellidocs-network

  # MinIO S3-Compatible Object Storage
  minio:
    image: minio/minio:latest
    container_name: intellidocs-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_password
    ports:
      - "9000:9000"      # API port
      - "9001:9001"      # Console port
    volumes:
      - minio_data:/minio_data
    command: server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - intellidocs-network

  # Ollama Local LLM
  ollama:
    image: ollama/ollama:latest
    container_name: intellidocs-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      # Use CPU by default; add GPU support if needed
      OLLAMA_DEVICE: cpu
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - intellidocs-network

  # ChromaDB Vector Database
  chromadb:
    image: chromadb/chroma:latest
    container_name: intellidocs-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - intellidocs-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: intellidocs-backend
    ports:
      - "3000:3000"
    environment:
      # Database - use service name instead of localhost
      DATABASE_URL: postgresql://intellidocs@postgres:5432/intellidocs_db?schema=public
      
      # Redis - use service name
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      
      # MinIO - use service name
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_password
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET_NAME: intellidocs-documents
      
      # Ollama - use service name
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: llama2
      
      # ChromaDB - use service name
      CHROMADB_URL: http://chromadb:8000
      CHROMADB_COLLECTION: intellidocs_embeddings
      
      # Application
      NODE_ENV: development
      PORT: 3000
      API_BASE_URL: http://localhost:3000
      FRONTEND_URL: http://localhost:3001
      
      # JWT
      JWT_SECRET: your_super_secret_jwt_key_change_this_in_production
      JWT_EXPIRATION: 7d
      
      # Logging
      LOG_LEVEL: debug
      
      # File Upload
      MAX_FILE_SIZE: 52428800
      ALLOWED_MIME_TYPES: application/pdf,image/png,image/jpeg
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /app/dist
    networks:
      - intellidocs-network
    command: npm run start:dev

volumes:
  postgres_data:
  redis_data:
  minio_data:
  ollama_data:
  chromadb_data:

networks:
  intellidocs-network:
    driver: bridge
