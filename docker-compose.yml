version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: intellidocs-postgres
    environment:
      POSTGRES_USER: intellidocs
      POSTGRES_PASSWORD: intellidocs_dev_password
      POSTGRES_DB: intellidocs_db
      POSTGRES_PORT: 5432
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intellidocs"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - intellidocs-network

  # Redis Cache & Job Queue
  redis:
    image: redis:7-alpine
    container_name: intellidocs-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - intellidocs-network

  # MinIO S3-Compatible Object Storage
  minio:
    image: minio/minio:latest
    container_name: intellidocs-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_password
    ports:
      - "9000:9000"      # API port
      - "9001:9001"      # Console port
    volumes:
      - minio_data:/minio_data
    command: server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - intellidocs-network

  # Ollama Local LLM
  ollama:
    image: ollama/ollama:latest
    container_name: intellidocs-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      # Use CPU by default; add GPU support if needed
      OLLAMA_DEVICE: cpu
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - intellidocs-network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  ollama_data:

networks:
  intellidocs-network:
    driver: bridge
